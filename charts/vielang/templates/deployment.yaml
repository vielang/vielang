apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vielang.fullname" . }}
  labels:
    {{- include "vielang.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vielang.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "vielang.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: vielang
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: mqtt
              containerPort: 1883
              protocol: TCP
            - name: mqtt-tls
              containerPort: 8883
              protocol: TCP
            - name: coap
              containerPort: 5683
              protocol: UDP
          env:
            - name: VL__DATABASE__POSTGRES__URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vielang.fullname" . }}-secrets
                  key: database-url
            - name: VL__SECURITY__JWT__SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vielang.fullname" . }}-secrets
                  key: jwt-secret
            - name: VL__CACHE__CACHE_TYPE
              value: {{ .Values.config.cacheType | quote }}
            - name: VL__QUEUE__QUEUE_TYPE
              value: {{ .Values.config.queueType | quote }}
            - name: VL__SERVER__ALLOWED_ORIGINS
              value: {{ .Values.config.allowedOrigins | quote }}
            - name: RUST_LOG
              value: {{ .Values.config.logLevel | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
